stages:
  - test

variables:
  SWIFT_VERSION: "6.2"
  NATS_VERSION: "2.10.24"

# Test job with NATS server, TLS, JetStream, and KV
test:
  image: swift:${SWIFT_VERSION}
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .build/
  before_script:
    - swift --version
    - apt-get update && apt-get install -y openssl wget netcat-openbsd
    # Download and install NATS server
    - wget -q https://github.com/nats-io/nats-server/releases/download/v${NATS_VERSION}/nats-server-v${NATS_VERSION}-linux-amd64.tar.gz
    - tar -xzf nats-server-v${NATS_VERSION}-linux-amd64.tar.gz
    - mv nats-server-v${NATS_VERSION}-linux-amd64/nats-server /usr/local/bin/
    - nats-server --version
    # Generate certs in .github/certs/ (config files use relative ./certs/ paths)
    - mkdir -p .github/certs
    - |
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        -keyout .github/certs/ca-key.pem \
        -out .github/certs/ca-cert.pem \
        -subj "/CN=Test CA/O=NATS-Test/C=US"
    - |
      openssl req -nodes -newkey rsa:2048 \
        -keyout .github/certs/server-key.pem \
        -out .github/certs/server.csr \
        -subj "/CN=localhost/O=NATS-Test/C=US"
      openssl x509 -req -days 365 \
        -in .github/certs/server.csr \
        -CA .github/certs/ca-cert.pem \
        -CAkey .github/certs/ca-key.pem \
        -CAcreateserial \
        -out .github/certs/server-cert.pem \
        -extfile <(echo "subjectAltName=DNS:localhost,IP:127.0.0.1")
    - |
      openssl req -nodes -newkey rsa:2048 \
        -keyout .github/certs/client-key.pem \
        -out .github/certs/client.csr \
        -subj "/CN=test-client/O=NATS-Test/C=US"
      openssl x509 -req -days 365 \
        -in .github/certs/client.csr \
        -CA .github/certs/ca-cert.pem \
        -CAkey .github/certs/ca-key.pem \
        -CAcreateserial \
        -out .github/certs/client-cert.pem
    # Start all NATS servers
    - nats-server -c .github/nats-server.conf &
    - nats-server -c .github/nats-token.conf &
    - nats-server -c .github/nats-userpass.conf &
    - nats-server -c .github/nats-nkey.conf &
    - nats-server -c .github/nats-mtls.conf &
    # Wait for all servers to be ready
    - |
      for i in $(seq 1 30); do
        nc -z localhost 4222 && nc -z localhost 4223 && nc -z localhost 4224 && nc -z localhost 4225 && nc -z localhost 4227 && echo "All NATS servers ready" && break
        sleep 1
      done
    - sleep 2
  script:
    - swift build
    - swift test --no-parallel
  after_script:
    - pkill nats-server || true
