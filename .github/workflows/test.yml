name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install NATS Server
        run: |
          wget -q https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz
          tar -xzf nats-server-v2.10.24-linux-amd64.tar.gz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
          nats-server --version

      - name: Generate TLS Certificates
        run: |
          # Generate certs in .github/certs/ (config files use relative ./certs/ paths)
          mkdir -p .github/certs

          # Generate CA key and certificate
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout .github/certs/ca-key.pem \
            -out .github/certs/ca-cert.pem \
            -subj "/CN=Test CA/O=NATS-Test/C=US"

          # Generate Server certificate signed by CA
          openssl req -nodes -newkey rsa:2048 \
            -keyout .github/certs/server-key.pem \
            -out .github/certs/server.csr \
            -subj "/CN=localhost/O=NATS-Test/C=US"
          openssl x509 -req -days 365 \
            -in .github/certs/server.csr \
            -CA .github/certs/ca-cert.pem \
            -CAkey .github/certs/ca-key.pem \
            -CAcreateserial \
            -out .github/certs/server-cert.pem \
            -extfile <(echo "subjectAltName=DNS:localhost,IP:127.0.0.1")

          # Generate Client certificate for mTLS (signed by CA)
          openssl req -nodes -newkey rsa:2048 \
            -keyout .github/certs/client-key.pem \
            -out .github/certs/client.csr \
            -subj "/CN=test-client/O=NATS-Test/C=US"
          openssl x509 -req -days 365 \
            -in .github/certs/client.csr \
            -CA .github/certs/ca-cert.pem \
            -CAkey .github/certs/ca-key.pem \
            -CAcreateserial \
            -out .github/certs/client-cert.pem

      - name: Start NATS Servers
        run: |
          # Main NATS server with TLS + JetStream (port 4222)
          nats-server -c .github/nats-server.conf &

          # Token authentication server (port 4223)
          nats-server -c .github/nats-token.conf &

          # User/Password authentication server (port 4224)
          nats-server -c .github/nats-userpass.conf &

          # NKey authentication server (port 4225)
          nats-server -c .github/nats-nkey.conf &

          # mTLS authentication server (port 4227)
          nats-server -c .github/nats-mtls.conf &

          # Wait for all servers to be ready
          for i in $(seq 1 30); do
            if nc -z localhost 4222 && nc -z localhost 4223 && nc -z localhost 4224 && nc -z localhost 4225 && nc -z localhost 4227; then
              echo "All NATS servers ready"
              break
            fi
            sleep 1
          done
          sleep 2

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test --no-parallel

      - name: Generate Coverage Report
        if: always()
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          COV_BIN=$(find ${BIN_PATH} -type f -executable -name '*Tests*' 2>/dev/null | head -1)

          if [ -z "$COV_BIN" ]; then
            COV_BIN=$(find ${BIN_PATH} -name '*.xctest' -type f 2>/dev/null | head -1)
          fi

          if [ -n "$COV_BIN" ] && [ -f ".build/debug/codecov/default.profdata" ]; then
            echo "Using coverage binary: $COV_BIN"
            llvm-cov export \
              -instr-profile=.build/debug/codecov/default.profdata \
              -ignore-filename-regex=".build|Tests" \
              -format=lcov \
              ${COV_BIN} > coverage.lcov || true
          else
            echo "Coverage data not available"
          fi

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop NATS Servers
        if: always()
        run: pkill nats-server || true
