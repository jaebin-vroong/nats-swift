# Combined NATS Server Configuration for testing
# Main server: port 4222, optional TLS, JetStream enabled

port: 4222

tls {
  cert_file: "/etc/nats/certs/server-cert.pem"
  key_file: "/etc/nats/certs/server-key.pem"
}

allow_non_tls: true

jetstream {
  store_dir: "/tmp/nats-jetstream"
}

authorization {
  timeout: 30
}

# Logging
debug: false
trace: false
